<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bio-Grid Soft Habitat</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="sim-shell">
        <canvas id="simCanvas" width="940" height="940"></canvas>
      </section>

      <aside class="panel">
        <div>
          <h1>Bio-Grid</h1>
          <p class="subtitle">极简生态热力学模拟器</p>
        </div>

        <div class="controls">
          <div class="row">
            <button id="btnPause">暂停</button>
            <button id="btnReset">清空</button>
            <button id="btnSeed">随机播种</button>
          </div>
          <div class="row row-tight">
            <button id="btnViewReset">重置视角</button>
            <button id="btnCellValues">格子数值：关</button>
          </div>

          <label>
            <span class="label-line"><span>速度（Tick / 秒）</span><span class="value" id="speedValue">300.0 tick/s</span></span>
            <input id="speedRange" type="range" min="0.2" max="480" step="0.2" value="300" />
          </label>

          <label>
            <span class="label-line"><span>笔刷半径</span></span>
            <input id="radiusRange" type="range" min="1" max="12" step="1" value="3" />
          </label>

          <label>
            <span class="label-line"><span>左键播种基因</span></span>
            <input id="geneRange" type="range" min="0" max="1" step="0.01" value="0.5" />
          </label>

          <label>
            <span class="label-line"><span>昼夜速度</span><span class="value" id="sunSpeedValue">0.03</span></span>
            <input id="sunSpeedRange" type="range" min="0.004" max="0.05" step="0.001" value="0.03" />
          </label>

          <label>
            <span class="label-line"><span>缩放</span><span class="value" id="zoomValue">1.0x</span></span>
            <input id="zoomRange" type="range" min="1" max="24" step="0.1" value="1" />
          </label>
        </div>

        <div class="orbit"><div id="skyBadge">☀</div></div>

        <div class="stats">
          <div class="card"><span class="k">Time</span><span class="v" id="statTime">0</span></div>
          <div class="card"><span class="k">Sunlight</span><span class="v" id="statSunlight">0</span></div>
          <div class="card"><span class="k">Biomass Ratio</span><span class="v" id="statBiomass">0</span></div>
          <div class="card"><span class="k">Plant Cells</span><span class="v" id="statPlants">0</span></div>
          <div class="card"><span class="k">Avg Gene</span><span class="v" id="statGene">0</span></div>
        </div>

        <p id="toolHint">左键：生命之笔；右键：扰动（Shift + 右键重度毁灭）；中键：墙体；滚轮缩放；空格+拖动平移</p>
        <canvas id="chartCanvas" width="360" height="156"></canvas>
        <p class="legend"><strong>Biomass</strong> 与 <strong>Avg Gene</strong> 随时间变化。观察昼夜筛选后，群体是否偏向激进（红）或保守（蓝）。</p>
      </aside>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
