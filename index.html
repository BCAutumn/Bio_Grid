<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bio-Grid Soft Habitat</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="sim-shell">
        <canvas id="simCanvas" width="720" height="720"></canvas>
        <div id="simPerfHud" aria-live="polite">300.0 tick/s | 60.0 FPS | 5.0 tick/frame</div>
      </section>

      <div class="sidebar-container">
        <!-- Panel 1: Controls -->
        <aside class="panel panel-controls">
          <div class="panel-header">
            <h1>Bio-Grid</h1>
            <p class="subtitle">极简生态热力学模拟器</p>
            <p class="subtitle" id="gridMeta"></p>
          </div>

          <div class="panel-tabs">
            <button id="tabControls" class="tab-btn is-active">控制台</button>
            <button id="tabMapEditor" class="tab-btn">地图编辑器</button>
            <button id="tabStats" class="tab-btn tab-btn-stats">数据与图表</button>
          </div>

          <div id="contentControls" class="tab-content is-active">
            <div class="controls">
              <div class="row">
                <button id="btnPause">暂停</button>
                <button id="btnReset">清空</button>
                <button id="btnSeed">随机播种</button>
              </div>
              <div class="row row-tight">
                <button id="btnViewReset">重置视角</button>
                <button id="btnCellValues">格子数值：关</button>
                <button id="btnAgingGlow">衰老预警：关</button>
                <button id="btnPolarDay">极昼模式：关</button>
              </div>

              <div class="label-group">
                <div class="label-line"><span class="label-title">笔刷模式</span></div>
                <div class="row brush-modes">
                  <button id="btnModeLife" class="is-active">播种</button>
                  <button id="btnModeDisturb">干扰</button>
                  <button id="btnModeAnnihilate">毁灭</button>
                </div>
              </div>

              <label>
                <span class="label-line"><span class="label-title">速度（Tick / 秒）</span><span class="value" id="speedValue">300.0 tick/s</span></span>
                <input id="speedRange" type="range" min="0.2" max="1920" step="0.2" value="300" />
              </label>

              <label>
                <span class="label-line"><span class="label-title">笔刷半径</span><span class="value" id="radiusValue">3</span></span>
                <input id="radiusRange" type="range" min="1" max="12" step="1" value="3" />
              </label>

              <label>
                <span class="label-line"><span class="label-title">左键播种基因</span><span class="value" id="geneValue">0.50</span></span>
                <input id="geneRange" type="range" min="0" max="1" step="0.01" value="0.5" />
              </label>

              <label>
                <span class="label-line"><span class="label-title">昼夜速度</span><span class="value" id="sunSpeedValue">0.014</span></span>
                <input id="sunSpeedRange" type="range" min="0.004" max="0.12" step="0.001" value="0.014" />
              </label>

              <label>
                <span class="label-line"><span class="label-title">缩放</span><span class="value" id="zoomValue">1.0x</span></span>
                <input id="zoomRange" type="range" min="1" max="24" step="0.1" value="1" />
              </label>
            </div>

            <p id="toolHint">当前模式：播种。左键拖动绘制；滚轮缩放；中键拖动平移。</p>
          </div>

          <div id="contentMapEditor" class="tab-content">
            <div class="controls">
              <div class="label-group">
                <div class="label-line"><span class="label-title">地形视图</span></div>
                <div class="row terrain-view-modes">
                  <button id="btnViewEco" class="is-active">生态</button>
                  <button id="btnViewTerrainLight">光照</button>
                  <button id="btnViewTerrainLoss">流失</button>
                  <button id="btnViewTerrainMix">复合</button>
                  <button id="btnViewTransfer">传输</button>
                </div>
              </div>

              <div class="label-group">
                <div class="label-line"><span class="label-title">地形笔刷</span></div>
                <div class="row terrain-brush-modes">
                  <button id="btnModeWall">墙体</button>
                  <button id="btnModeErase">擦除</button>
                  <button id="btnModeLightUp">光照+</button>
                  <button id="btnModeLightDown">光照-</button>
                  <button id="btnModeLossUp">流失+</button>
                  <button id="btnModeLossDown">流失-</button>
                </div>
              </div>

              <label>
                <span class="label-line"><span class="label-title">地形刷强度</span><span class="value" id="terrainStrengthValue">0.08</span></span>
                <input id="terrainStrengthRange" type="range" min="0.01" max="0.25" step="0.01" value="0.08" />
              </label>

              <label>
                <span class="label-line"><span class="label-title">笔刷半径</span><span class="value" id="radiusValueMap">3</span></span>
                <input id="radiusRangeMap" type="range" min="1" max="12" step="1" value="3" />
              </label>

              <div class="label-group">
                <div class="label-line"><span class="label-title">笔刷形状</span></div>
                <div class="row brush-shapes">
                  <button id="btnShapeCircle" class="is-active">圆形</button>
                  <button id="btnShapeSquare">方形</button>
                  <button id="btnShapeTriangle">三角形</button>
                </div>
              </div>

              <div class="label-group">
                <div class="label-line"><span class="label-title">地形预设</span></div>
                <div class="row preset-modes">
                  <button id="btnPresetEmpty">空地</button>
                  <button id="btnPresetFourRooms">四宫格</button>
                  <button id="btnPresetMaze">迷宫</button>
                  <button id="btnPresetFiveZones">五区地形</button>
                  <button id="btnPresetHourglass">沙漏</button>
                  <button id="btnPresetRings">同心环</button>
                  <button id="btnPresetVerticalGradient">纵向梯度</button>
                </div>
                <div class="preset-note">
                  <div class="preset-note-grid">
                    <span><i class="swatch zone-hl"></i>光照+</span>
                    <span><i class="swatch zone-lh"></i>光照-</span>
                    <span><i class="swatch zone-hh"></i>流失+</span>
                    <span><i class="swatch zone-ll"></i>流失-</span>
                  </div>
                </div>
              </div>

              <div class="label-group">
                <div class="label-line"><span class="label-title">恢复操作</span></div>
                <div class="row row-tight">
                  <button id="btnMapUndo" disabled>撤销</button>
                  <button id="btnMapRedo" disabled>重做</button>
                </div>
              </div>

              <div class="label-group">
                <div class="label-line"><span class="label-title">地形重置</span></div>
                <div class="row">
                  <button id="btnTerrainUniformReset">均匀光照/流失</button>
                </div>
              </div>
            </div>

            <p id="mapHint">地图编辑建议：优先使用“复合”视图观察地形，再用墙体/擦除进行微调。</p>
          </div>
        </aside>

        <!-- Panel 2: Stats -->
        <aside class="panel panel-stats" id="contentStats">
          <div class="orbit" id="skyOrbit">
            <div class="celestial celestial-sun"></div>
            <div class="celestial celestial-moon"></div>
          </div>

          <div class="stats">
            <div class="card"><span class="k">Day</span><span class="v" id="statTime">0</span></div>
            <div class="card"><span class="k">Sunlight</span><span class="v" id="statSunlight">0</span></div>
            <div class="card"><span class="k">Biomass(norm)</span><span class="v" id="statBiomass">0</span></div>
            <div class="card"><span class="k">Cells</span><span class="v" id="statPlants">0</span></div>
            <div class="card"><span class="k">Avg Gene</span><span class="v" id="statGene">0</span></div>
            <div class="card"><span class="k">Senescent</span><span class="v" id="statSenescent">0</span></div>
          </div>

          <div class="chart-container">
            <canvas id="chartCanvas" width="370" height="240"></canvas>
            <div class="legend">
              <span><span class="legend-color legend-hot"></span> Biomass(norm)</span>
              <span><span class="legend-color legend-cold"></span> Avg Gene</span>
              <span><span class="legend-color legend-warn"></span> Senescent Ratio</span>
            </div>
          </div>
        </aside>
      </div>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
